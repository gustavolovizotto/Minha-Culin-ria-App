<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nova Receita - Minha Culinária</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700;900&amp;family=Space+Grotesk:wght@500;700&amp;family=Work+Sans:wght@400&amp;display=swap" rel="stylesheet"/>

                  "outline": "#89726c",
                  "on-secondary-fixed": "#03210c",

                  "primary-fixed": "#ffdbd0",
                  "surface-container-high": "#ebe8e2",
                  "on-error-container": "#93000a",
                  "surface-container-low": "#f6f3ed",
                  "on-surface-variant": "#55423d",
                  "tertiary": "#613000",
                  "on-primary-fixed-variant": "#7c2d13",
                  "surface-bright": "#fcf9f3",
                  "secondary-fixed": "#c8ecc9",
                  "surface-container-highest": "#e5e2dc",
                  "on-surface": "#1c1c18",
                  "surface": "#fcf9f3",
                  "tertiary-fixed-dim": "#ffb780",
                  "on-tertiary-fixed-variant": "#6f3800",
                  "on-secondary-fixed-variant": "#2f4d34",
                  "on-primary-fixed": "#3a0a00",
                  "on-error": "#ffffff",
                  "inverse-on-surface": "#f3f0ea",
                  "secondary-fixed-dim": "#adcfae",
                  "inverse-primary": "#ffb59f",
                  "on-primary-container": "#ffb8a3",

                  "secondary": "#47664b",

                  "secondary-container": "#c8ecc9",
                  "surface-dim": "#dcdad4",
                  "surface-variant": "#e5e2dc",
                  "on-background": "#1c1c18",
                  "primary-container": "#8e3a1f",
                  "on-secondary-container": "#4c6c50",
                  "on-tertiary-fixed": "#2f1400",
                  "surface-container-lowest": "#ffffff",
                  "on-secondary": "#ffffff",
                  "primary-fixed-dim": "#ffb59f",
                  "on-tertiary": "#ffffff",

          "borderRadius": {

                  "full": "0.75rem"
          },
          "spacing": {

                  "margin-mobile": "20px",
                  "gutter": "24px",

          "fontFamily": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col pb-24 md:pb-0 pt-16">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 fixed top-0 z-50 bg-[#FAF9F6] dark:bg-[#1A1A1A] border-b border-[#D2CFC9] dark:border-[#333333] shadow-sm font-['Epilogue'] font-bold tracking-tight">
<button aria-label="Menu" class="flex items-center justify-center p-2 text-[#5A5A5A] dark:text-[#A0A0A0] hover:bg-[#F2F1ED] dark:hover:bg-[#2A2A2A] transition-all duration-200 active:scale-95 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<div class="text-xl font-black text-[#8E3A1F] dark:text-[#E2725B] uppercase tracking-widest">Minha Culinária</div>
<button aria-label="Chef Profile" class="flex items-center justify-center p-2 rounded-full overflow-hidden hover:bg-[#F2F1ED] dark:hover:bg-[#2A2A2A] transition-all duration-200 active:scale-95 text-[#5A5A5A] dark:text-[#A0A0A0]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-margin-mobile md:px-margin-desktop py-md max-w-[1440px] mx-auto w-full">
<!-- Progress Indicator -->
<div class="w-full max-w-2xl mb-lg">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Passo 1 de 3</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Informações Básicas</span>
</div>
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden flex">
<div class="h-full bg-primary w-1/3"></div>
</div>
</div>
<!-- Title & Image Section -->
<div class="w-full max-w-2xl bg-surface-container rounded-lg border border-outline-variant p-md mb-md shadow-sm relative overflow-hidden group">
<!-- Subtle highlight line for tactile feel -->
<div class="absolute inset-x-0 top-0 h-[1px] bg-white opacity-50"></div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-md">Nova Receita</h1>
<!-- Image Upload Area -->
<div class="w-full aspect-[16/9] md:aspect-[21/9] bg-surface-variant rounded-lg border border-dashed border-outline hover:border-primary-container transition-colors flex flex-col items-center justify-center cursor-pointer shadow-inner relative overflow-hidden group mb-md">
<span class="material-symbols-outlined text-display-lg text-outline mb-sm group-hover:text-primary-container transition-colors" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
<span class="font-title-sm text-title-sm text-on-surface-variant group-hover:text-primary-container transition-colors">Adicionar Foto Principal</span>
<span class="font-body-md text-body-md text-outline mt-xs">Toque para selecionar da galeria</span>
</div>
<!-- Inputs Form -->
<div class="space-y-md">
<!-- Recipe Title -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs" for="recipe-title">Título da Receita</label>
<input class="w-full bg-surface rounded-lg border border-outline-variant px-sm py-sm font-title-sm text-title-sm text-on-surface focus:outline-none focus:border-tertiary-fixed-dim focus:ring-1 focus:ring-tertiary-fixed-dim shadow-inner placeholder:text-outline transition-all" id="recipe-title" placeholder="Ex: Boeuf Bourguignon Clássico" type="text"/>
</div>
<!-- Recipe Description -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs" for="recipe-desc">Descrição Curta</label>
<textarea class="w-full bg-surface rounded-lg border border-outline-variant px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-tertiary-fixed-dim focus:ring-1 focus:ring-tertiary-fixed-dim shadow-inner placeholder:text-outline resize-none transition-all" id="recipe-desc" placeholder="A essência deste prato, suas origens e por que merece estar no cofre..." rows="3"></textarea>
</div>
<!-- Categories Selection -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs">Categoria Primária</label>
<div class="flex flex-wrap gap-xs">
<button class="px-sm py-xs rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-variant transition-colors">Entrada</button>
<button class="px-sm py-xs rounded-full border border-primary bg-primary-container text-on-primary-container font-label-caps text-label-caps shadow-sm">Prato Principal</button>
<button class="px-sm py-xs rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-variant transition-colors">Sobremesa</button>
<button class="px-sm py-xs rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-variant transition-colors">Molhos</button>
<button class="px-sm py-xs rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-variant transition-colors">Bebidas</button>
</div>
</div>
</div>
</div>
<!-- Action Bar -->
<div class="w-full max-w-2xl flex justify-end mt-md">
<button class="bg-primary text-on-primary font-title-sm text-title-sm px-lg py-sm rounded-lg shadow-sm border-t border-[rgba(255,255,255,0.2)] hover:bg-primary-container transition-colors active:scale-95 flex items-center gap-xs">
        Próximo
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar (Mobile Only based on requirements, but hidden on transactional/creation flow as per rules) -->
<!-- Note: The prompt describes a Linear/Transactional page ("Step 1 of 3", "Próximo" action). 
       According to the "Shell Visibility & Relevance (THE FILTER)" rule:
       "Automatic Suppression: You MUST exclude the navigation shell if the page intent is:
       Linear/Transactional: Login, Sign-up, Onboarding, Checkout, or "Success/Confirmation" splash screens.
       Task-Focused: Any sub-page featuring a "Close" or "Back" action that implies a temporary departure from the main navigation flow."
       Therefore, BottomNavBar and NavigationDrawer are suppressed to focus on the canvas. -->
</body></html>
